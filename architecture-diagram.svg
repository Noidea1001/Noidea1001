<svg width="1100" height="330" viewBox="0 0 1100 330" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nodeFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1100" height="330" fill="#0d1117" rx="14"/>

  <text x="550" y="42" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica, sans-serif" font-size="20" font-weight="600">System Architecture</text>

  <!-- Static connection lines -->
  <line x1="230" y1="150" x2="318" y2="150" stroke="#30363d" stroke-width="2"/>
  <line x1="550" y1="150" x2="638" y2="150" stroke="#30363d" stroke-width="2"/>
  <line x1="790" y1="150" x2="878" y2="150" stroke="#30363d" stroke-width="2"/>
  <line x1="435" y1="230" x2="435" y2="187" stroke="#30363d" stroke-width="2"/>

  <!-- Arrowheads -->
  <path d="M312,145 L322,150 L312,155 z" fill="#1f6feb"/>
  <path d="M632,145 L642,150 L632,155 z" fill="#1f6feb"/>
  <path d="M872,145 L882,150 L872,155 z" fill="#1f6feb"/>
  <path d="M430,192 L435,182 L440,192 z" fill="#3fb950"/>

  <!-- Moving particles: Frontend -> Web API -->
  <circle r="4" fill="#58a6ff" filter="url(#glow)">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M230,150 L316,150"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#58a6ff" filter="url(#glow)">
    <animateMotion dur="1.6s" begin="0.8s" repeatCount="indefinite" path="M230,150 L316,150"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Moving particles: Web API -> EF Core -->
  <circle r="4" fill="#58a6ff" filter="url(#glow)">
    <animateMotion dur="1.6s" begin="0.3s" repeatCount="indefinite" path="M550,150 L636,150"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#58a6ff" filter="url(#glow)">
    <animateMotion dur="1.6s" begin="1.1s" repeatCount="indefinite" path="M550,150 L636,150"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="1.1s" repeatCount="indefinite"/>
  </circle>

  <!-- Moving particles: EF Core -> Database -->
  <circle r="4" fill="#58a6ff" filter="url(#glow)">
    <animateMotion dur="1.6s" begin="0.6s" repeatCount="indefinite" path="M790,150 L876,150"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#58a6ff" filter="url(#glow)">
    <animateMotion dur="1.6s" begin="1.4s" repeatCount="indefinite" path="M790,150 L876,150"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.6s" begin="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Moving particles: Auth -> Web API -->
  <circle r="4" fill="#3fb950" filter="url(#glow)">
    <animateMotion dur="1.4s" repeatCount="indefinite" path="M435,228 L435,190"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Frontend -->
  <rect x="40" y="115" width="190" height="70" rx="10" fill="url(#nodeFill)" stroke="#1f6feb" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.4s" repeatCount="indefinite"/>
  </rect>
  <text x="135" y="145" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600">Frontend</text>
  <text x="135" y="165" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Helvetica, sans-serif" font-size="11">HTML · JS · Bootstrap 5</text>

  <!-- Web API -->
  <rect x="320" y="115" width="230" height="70" rx="10" fill="url(#nodeFill)" stroke="#1f6feb" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.4s" begin="0.4s" repeatCount="indefinite"/>
  </rect>
  <text x="435" y="145" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600">ASP.NET Core</text>
  <text x="435" y="165" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Helvetica, sans-serif" font-size="11">Web API</text>

  <!-- EF Core -->
  <rect x="640" y="115" width="150" height="70" rx="10" fill="url(#nodeFill)" stroke="#1f6feb" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
  </rect>
  <text x="715" y="145" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600">EF Core</text>
  <text x="715" y="165" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Helvetica, sans-serif" font-size="11">Data Access</text>

  <!-- Database -->
  <rect x="880" y="115" width="190" height="70" rx="10" fill="url(#nodeFill)" stroke="#1f6feb" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
  </rect>
  <text x="975" y="145" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica, sans-serif" font-size="15" font-weight="600">Database</text>
  <text x="975" y="165" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Helvetica, sans-serif" font-size="11">SQLite · PostgreSQL</text>

  <!-- Auth -->
  <rect x="320" y="230" width="230" height="60" rx="10" fill="url(#nodeFill)" stroke="#3fb950" stroke-width="1.8">
    <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="2.4s" begin="1.6s" repeatCount="indefinite"/>
  </rect>
  <text x="435" y="255" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Helvetica, sans-serif" font-size="14" font-weight="600">Identity / Auth</text>
  <text x="435" y="273" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Helvetica, sans-serif" font-size="11">Cookie-based Authentication</text>
</svg>
